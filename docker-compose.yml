services:
  app:
    build:
      context: ./core-ash
      dockerfile: ../Dockerfile
      args:
        - MIX_ENV=${MIX_ENV}
    container_name: fleet_app
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - MIX_ENV=${MIX_ENV}
    depends_on:
      - db
      - nats

  gateway:
    build:
      context: ./gateway-go
      dockerfile: Dockerfile
    container_name: fleet_gateway
    restart: always
    env_file:
      - .env
    depends_on:
      - nats

  consumer:
    build: 
      context: ./gateway-go
      dockerfile: Dockerfile
    container_name: fleet_consumer
    restart: always
    env_file:
      - .env
    depends_on:
      - nats
      - app

  db:
    image: timescale/timescaledb:latest-pg15
    container_name: fleet_db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - ${DB_VOLUME_PATH:-postgres_data}:/var/lib/postgresql/data
    shm_size: "128mb"

  nats:
    image: nats:latest
    container_name: fleet_nats
    restart: always
    command: ["-js", "-m", "8222"]
    volumes:
      - ./nats-data:/data

volumes:
  postgres_data:
  _build_cache:
  deps_cache:
