root = "cmd/gateway"
tmp_dir = "../../tmp"
testdata_dir = "testdata"

[build]
  cmd = "go build -o ./tmp/gateway ./cmd/gateway/main.go"
  bin = "./tmp/gateway"
  include_ext = ["go", "tpl", "tmpl", "html", "toml"]
  exclude_dir = ["assets", "tmp", "vendor", "test"]
  delay = 1000
  poll = true
  poll_interval = 500

[log]
  time = true